    <text x="735" y="306" fill="#F8FAFC" font-family="Inter, Arial, sans-serif" font-size="38" font-weight="900">OpenAI</text>
    <text x="767" y="350" fill="#A7B3C6" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="800">编号 003</text>
