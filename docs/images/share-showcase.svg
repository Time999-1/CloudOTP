    <linearGradient id="p" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#7C5CFF"/><stop offset="1" stop-color="#4F46E5"/></linearGradient>
    <filter id="s"><feDropShadow dx="0" dy="32" stdDeviation="38" flood-color="#0F172A" flood-opacity=".14"/></filter>
  </defs>
  <rect width="1600" height="860" fill="url(#bg)"/>
  <rect x="470" y="150" width="660" height="560" rx="48" fill="#fff" opacity=".72"/>
