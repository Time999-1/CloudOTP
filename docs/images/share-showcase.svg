    <text x="716" y="414" fill="#F8FAFC" font-family="SFMono-Regular, Menlo, monospace" font-size="28" font-weight="900" letter-spacing="8">638537</text>
    <circle cx="800" cy="505" r="55" fill="#263244"/>
    <path d="M800 450a55 55 0 1 1-37 96" stroke="#34D399" stroke-width="10" stroke-linecap="round"/>
    <circle cx="800" cy="505" r="43" fill="#111827"/>
    <text x="782" y="505" fill="#F8FAFC" font-family="Inter, Arial, sans-serif" font-size="34" font-weight="950">17</text>
