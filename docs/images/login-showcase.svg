<svg width="1600" height="920" viewBox="0 0 1600 920" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">CloudOTP 登录页预览</title>
  <desc id="desc">CloudOTP 登录页，展示 2FA 管理平台介绍和登录表单。</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1600" y2="920"><stop stop-color="#FFFFFF"/><stop offset="1" stop-color="#F3F5FF"/></linearGradient>
    <linearGradient id="p" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#7C5CFF"/><stop offset="1" stop-color="#4F46E5"/></linearGradient>
    <filter id="s"><feDropShadow dx="0" dy="26" stdDeviation="34" flood-color="#0F172A" flood-opacity=".10"/></filter>
  </defs>
  <rect width="1600" height="920" fill="url(#bg)"/>
  <g filter="url(#s)">
    <rect x="180" y="110" width="1240" height="650" rx="42" fill="#fff" opacity=".92"/>
    <rect x="238" y="170" width="54" height="54" rx="18" fill="url(#p)"/>
    <text x="314" y="205" fill="#0F172A" font-family="Inter, Arial, sans-serif" font-size="26" font-weight="900">2FA 管理</text>
    <text x="238" y="345" fill="#0F172A" font-family="Inter, Arial, sans-serif" font-size="58" font-weight="950">安全、高效的</text>
    <text x="238" y="414" fill="#6D5DFB" font-family="Inter, Arial, sans-serif" font-size="58" font-weight="950">2FA 管理平台</text>
    <text x="242" y="468" fill="#64748B" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="700">集中管理验证码、账号分类与分享链接。</text>
    <rect x="238" y="560" width="150" height="104" rx="22" fill="#F8FAFC"/><text x="276" y="624" fill="#4F46E5" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="900">动态验证码</text>
    <rect x="410" y="560" width="150" height="104" rx="22" fill="#F8FAFC"/><text x="455" y="624" fill="#4F46E5" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="900">分类管理</text>
    <rect x="582" y="560" width="150" height="104" rx="22" fill="#F8FAFC"/><text x="626" y="624" fill="#4F46E5" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="900">安全分享</text>
    <rect x="950" y="188" width="360" height="500" rx="32" fill="#fff" stroke="#E2E8F0"/>
    <text x="1000" y="258" fill="#0F172A" font-family="Inter, Arial, sans-serif" font-size="34" font-weight="950">登录系统</text>
    <text x="1000" y="292" fill="#64748B" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="700">欢迎回来，请使用账号登录</text>
    <rect x="1000" y="356" width="260" height="54" rx="12" fill="#F8FAFC" stroke="#DBE3EE"/>
    <text x="1022" y="389" fill="#94A3B8" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="700">请输入账号</text>
    <rect x="1000" y="454" width="260" height="54" rx="12" fill="#F8FAFC" stroke="#DBE3EE"/>
    <text x="1022" y="488" fill="#94A3B8" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="700">请输入密码</text>
    <rect x="1000" y="560" width="260" height="58" rx="16" fill="url(#p)"/>
    <text x="1114" y="596" fill="#fff" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="900">登录</text>
  </g>
</svg>
